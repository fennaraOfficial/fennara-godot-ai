name: GDExtension Build

on:
  pull_request:
    branches:
      - main
    paths:
      - "fennara-cpp/**"
      - "godot_demo/addons/fennara/**"
      - "godot_demo/tests/**"
      - "scripts/prepare-linux-cef-sdk.mjs"
      - ".github/workflows/gdextension-build.yml"
  push:
    branches:
      - main
    paths:
      - "fennara-cpp/**"
      - "godot_demo/addons/fennara/**"
      - "godot_demo/tests/**"
      - "scripts/prepare-linux-cef-sdk.mjs"
      - ".github/workflows/gdextension-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gdextension-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check source layout
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "fennara-cpp/SConstruct" && -d "fennara-cpp/godot-cpp" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::notice::fennara-cpp source is not present yet; skipping GDExtension build."

      - name: Set up Python
        if: steps.source.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        if: steps.source.outputs.available == 'true'
        run: pip install scons

      - name: Install Linux build dependencies
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential bzip2 pkg-config

      - name: Setup Node.js
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Linux CEF SDK
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        id: linux_cef_sdk
        run: node scripts/prepare-linux-cef-sdk.mjs

      - name: Compute godot-cpp cache key
        if: steps.source.outputs.available == 'true'
        id: godot_cpp_cache_key
        shell: bash
        run: |
          set -euo pipefail
          source_hash="${{ hashFiles('fennara-cpp/godot-cpp/SConstruct', 'fennara-cpp/godot-cpp/tools/**/*.py', 'fennara-cpp/godot-cpp/include/**/*.h', 'fennara-cpp/godot-cpp/include/**/*.hpp', 'fennara-cpp/godot-cpp/gdextension/*.json') }}"
          image_id="${ImageOS:-${RUNNER_OS:-unknown}}-${ImageVersion:-unknown}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            toolchain_id="$(powershell -NoProfile -Command '$vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"; if (Test-Path $vswhere) { $install = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; if ($install) { $versions = Get-ChildItem (Join-Path $install "VC\Tools\MSVC") -Directory | Sort-Object Name -Descending; if ($versions) { $versions[0].Name } } }' | tr -d '\r')"
          else
            toolchain_id="$(c++ --version | head -n 1)"
          fi
          toolchain_id="$(printf "%s" "${toolchain_id:-unknown}" | tr -c 'A-Za-z0-9_.-' '-')"
          base="godot-cpp-v2-${{ runner.os }}-${{ matrix.platform }}-editor-${source_hash}-${image_id}-${toolchain_id}"
          echo "primary=${base}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
          echo "restore=${base}-" >> "$GITHUB_OUTPUT"
          echo "image-id=${image_id}" >> "$GITHUB_OUTPUT"
          echo "toolchain-id=${toolchain_id}" >> "$GITHUB_OUTPUT"

      - name: Cache SCons and godot-cpp outputs
        if: steps.source.outputs.available == 'true'
        id: godot_cpp_cache
        uses: actions/cache@v4
        with:
          path: |
            fennara-cpp/.scons_cache/
            fennara-cpp/.sconsign.dblite
            fennara-cpp/godot-cpp/bin/
            fennara-cpp/godot-cpp/gen/
            fennara-cpp/godot-cpp/src/**/*.obj
            fennara-cpp/godot-cpp/src/**/*.pdb
          key: ${{ steps.godot_cpp_cache_key.outputs.primary }}
          restore-keys: |
            ${{ steps.godot_cpp_cache_key.outputs.restore }}

      - name: Report godot-cpp cache
        if: steps.source.outputs.available == 'true'
        run: |
          echo "cache-hit: ${{ steps.godot_cpp_cache.outputs.cache-hit }}"
          echo "cache-primary-key: ${{ steps.godot_cpp_cache_key.outputs.primary }}"
          echo "cache-restore-prefix: ${{ steps.godot_cpp_cache_key.outputs.restore }}"
          echo "runner-image: ${{ steps.godot_cpp_cache_key.outputs.image-id }}"
          echo "toolchain-id: ${{ steps.godot_cpp_cache_key.outputs.toolchain-id }}"

      - name: Build GDExtension
        if: steps.source.outputs.available == 'true'
        working-directory: fennara-cpp
        env:
          SCONS_CACHE: ${{ github.workspace }}/fennara-cpp/.scons_cache
          FENNARA_CEF_ROOT: ${{ steps.linux_cef_sdk.outputs.cef_root }}
        run: scons platform=${{ matrix.platform }} target=editor --debug=explain --cache-show

      - name: Download Godot for native tests
        if: steps.source.outputs.available == 'true' && matrix.platform == 'windows'
        id: godot
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "godot.zip"
          $directory = Join-Path $env:RUNNER_TEMP "godot"
          Invoke-WebRequest `
            -Uri "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_win64.exe.zip" `
            -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $directory
          $console = Get-ChildItem -LiteralPath $directory -Filter "*console.exe" |
            Select-Object -First 1
          if (-not $console) {
            throw "Godot console executable was not found after extraction."
          }
          "console=$($console.FullName)" >> $env:GITHUB_OUTPUT

      - name: Download Godot for Linux guidance test
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        id: godot_linux
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/godot.zip"
          directory="${RUNNER_TEMP}/godot"
          curl --fail --location \
            "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip" \
            --output "${archive}"
          expected_sha256="c7316e1fd782ad276a4d985a7673b5976eaaa8d90561a2bea5289210dc53e9ba"
          actual_sha256="$(sha256sum "${archive}" | awk '{print $1}')"
          if [[ "${actual_sha256}" != "${expected_sha256}" ]]; then
            echo "::error::Godot Linux archive SHA-256 did not match the pinned release digest."
            exit 1
          fi
          mkdir -p "${directory}"
          unzip -q "${archive}" -d "${directory}"
          executable="$(find "${directory}" -maxdepth 1 -type f -name 'Godot_*_linux.x86_64' -print -quit)"
          if [[ -z "${executable}" ]]; then
            echo "::error::Godot Linux executable was not found after extraction."
            exit 1
          fi
          chmod +x "${executable}"
          echo "executable=${executable}" >> "$GITHUB_OUTPUT"

      - name: Test native editor states
        if: steps.source.outputs.available == 'true' && matrix.platform == 'windows'
        timeout-minutes: 20
        shell: pwsh
        working-directory: fennara-cpp
        env:
          SCONS_CACHE: ${{ github.workspace }}/fennara-cpp/.scons_cache
        run: |
          scons platform=windows target=editor fennara_setup_tests=yes
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $testTimeoutSeconds = 120
          $testScripts = @(
            "res://tests/first_run_setup_test.gd",
            "res://tests/asset_import_script_context_test.gd",
            "res://tests/screenshot_scene_contract_test.gd",
            "res://tests/screenshot_session_viewport_test.gd",
            "res://tests/image_sheet_test.gd",
            "res://tests/runtime_image_context_test.gd",
            "res://tests/ai_guidance_read_test.gd"
          )
          foreach ($testScript in $testScripts) {
            $godot = Start-Process `
              -FilePath "${{ steps.godot.outputs.console }}" `
              -ArgumentList @(
                "--headless",
                "--path",
                '"${{ github.workspace }}\godot_demo"',
                "--script",
                $testScript
              ) `
              -NoNewWindow `
              -PassThru
            if (-not $godot.WaitForExit($testTimeoutSeconds * 1000)) {
              Write-Host "::error::Native test $testScript exceeded ${testTimeoutSeconds} seconds."
              & taskkill.exe /PID $godot.Id /T /F
              exit 124
            }
            if ($godot.ExitCode -ne 0) {
              exit $godot.ExitCode
            }
          }

      - name: Test Linux guidance containment
        if: steps.source.outputs.available == 'true' && matrix.platform == 'linux'
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          timeout 120 \
            "${{ steps.godot_linux.outputs.executable }}" \
            --headless \
            --path "${{ github.workspace }}/godot_demo" \
            --script res://tests/ai_guidance_read_test.gd
