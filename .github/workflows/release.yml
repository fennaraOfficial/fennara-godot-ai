name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without v prefix. Must match VERSION."
        required: true
        type: string
      promote_latest:
        description: "Mark the exact release as GitHub Latest and seed the frozen legacy latest bootstrap if needed."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  linux-cef-runtime:
    name: prepare Linux CEF runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release input
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release workflow must run from main."
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${version}" != "${{ inputs.version }}" ]]; then
            echo "::error::VERSION (${version}) does not match workflow input (${{ inputs.version }})."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux CEF packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential bzip2 binutils

      - name: Prepare Linux CEF SDK
        id: linux_cef_sdk
        run: |
          node scripts/prepare-linux-cef-sdk.mjs \
            --out-dir "${RUNNER_TEMP}/fennara-cef-sdk" \
            --download-dir "${RUNNER_TEMP}/fennara-cef-download"

      - name: Build Linux CEF runtime release asset
        run: |
          node scripts/prepare-linux-cef-runtime.mjs \
            --cef-root "${{ steps.linux_cef_sdk.outputs.cef_root }}" \
            --version "139.0.28+g55ab8a8+chromium-139.0.7258.139" \
            --out-dir dist/linux-cef-runtime-release \
            --write-manifest dist/generated-linux-cef-manifest/linux-cef.json

      - name: Validate generated Linux CEF runtime asset
        run: |
          cp dist/generated-linux-cef-manifest/linux-cef.json local/webview-runtimes/linux-cef.json
          node scripts/check-linux-cef-runtime-release.mjs --assets-dir dist/linux-cef-runtime-release

      - name: Upload generated Linux CEF manifest
        uses: actions/upload-artifact@v4
        with:
          name: fennara-generated-linux-cef-manifest
          path: dist/generated-linux-cef-manifest/linux-cef.json
          if-no-files-found: error

      - name: Upload Linux CEF runtime release asset
        uses: actions/upload-artifact@v4
        with:
          name: fennara-release-linux-cef-runtime
          path: dist/linux-cef-runtime-release/*.zip
          if-no-files-found: error

  package:
    name: package ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: linux-cef-runtime

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x86_64
            os: windows-latest
          - platform: linux
            arch: x86_64
            os: ubuntu-latest
          - platform: macos
            arch: arm64
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify release input
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release workflow must run from main."
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${version}" != "${{ inputs.version }}" ]]; then
            echo "::error::VERSION (${version}) does not match workflow input (${{ inputs.version }})."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check version sync
        run: node scripts/check-version.mjs

      - name: Download generated Linux CEF manifest
        uses: actions/download-artifact@v4
        with:
          name: fennara-generated-linux-cef-manifest
          path: generated-linux-cef-manifest

      - name: Use generated Linux CEF manifest
        shell: bash
        run: cp generated-linux-cef-manifest/linux-cef.json local/webview-runtimes/linux-cef.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential bzip2 pkg-config ripgrep

      - name: Install Windows ripgrep
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Install macOS ripgrep
        if: matrix.platform == 'macos'
        run: brew install ripgrep

      - name: Prepare Linux CEF SDK
        if: matrix.platform == 'linux'
        id: linux_cef_sdk
        run: node scripts/prepare-linux-cef-sdk.mjs

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute godot-cpp cache key
        id: godot_cpp_cache_key
        shell: bash
        run: |
          set -euo pipefail
          source_hash="${{ hashFiles('fennara-cpp/godot-cpp/SConstruct', 'fennara-cpp/godot-cpp/tools/**/*.py', 'fennara-cpp/godot-cpp/include/**/*.h', 'fennara-cpp/godot-cpp/include/**/*.hpp', 'fennara-cpp/godot-cpp/gdextension/*.json') }}"
          image_id="${ImageOS:-${RUNNER_OS:-unknown}}-${ImageVersion:-unknown}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            toolchain_id="$(powershell -NoProfile -Command '$vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"; if (Test-Path $vswhere) { $install = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; if ($install) { $versions = Get-ChildItem (Join-Path $install "VC\Tools\MSVC") -Directory | Sort-Object Name -Descending; if ($versions) { $versions[0].Name } } }' | tr -d '\r')"
          else
            toolchain_id="$(c++ --version | head -n 1)"
          fi
          toolchain_id="$(printf "%s" "${toolchain_id:-unknown}" | tr -c 'A-Za-z0-9_.-' '-')"
          base="godot-cpp-v2-${{ runner.os }}-${{ matrix.platform }}-editor-${source_hash}-${image_id}-${toolchain_id}"
          echo "primary=${base}-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
          echo "restore=${base}-" >> "$GITHUB_OUTPUT"
          echo "image-id=${image_id}" >> "$GITHUB_OUTPUT"
          echo "toolchain-id=${toolchain_id}" >> "$GITHUB_OUTPUT"

      - name: Cache SCons and godot-cpp outputs
        id: godot_cpp_cache
        uses: actions/cache@v4
        with:
          path: |
            fennara-cpp/.scons_cache/
            fennara-cpp/.sconsign.dblite
            fennara-cpp/godot-cpp/bin/
            fennara-cpp/godot-cpp/gen/
            fennara-cpp/godot-cpp/src/**/*.obj
            fennara-cpp/godot-cpp/src/**/*.pdb
          key: ${{ steps.godot_cpp_cache_key.outputs.primary }}
          restore-keys: |
            ${{ steps.godot_cpp_cache_key.outputs.restore }}

      - name: Report godot-cpp cache
        run: |
          echo "cache-hit: ${{ steps.godot_cpp_cache.outputs.cache-hit }}"
          echo "cache-primary-key: ${{ steps.godot_cpp_cache_key.outputs.primary }}"
          echo "cache-restore-prefix: ${{ steps.godot_cpp_cache_key.outputs.restore }}"
          echo "runner-image: ${{ steps.godot_cpp_cache_key.outputs.image-id }}"
          echo "toolchain-id: ${{ steps.godot_cpp_cache_key.outputs.toolchain-id }}"

      - name: Cache Cargo artifacts
        id: cargo_cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            local/target
          key: local-cargo-${{ runner.os }}-${{ hashFiles('local/Cargo.lock') }}
          restore-keys: |
            local-cargo-${{ runner.os }}-

      - name: Report Cargo cache
        run: |
          echo "cache-hit: ${{ steps.cargo_cache.outputs.cache-hit }}"
          echo "cache-primary-key: local-cargo-${{ runner.os }}-${{ hashFiles('local/Cargo.lock') }}"

      - name: Build GDExtension
        working-directory: fennara-cpp
        env:
          SCONS_CACHE: ${{ github.workspace }}/fennara-cpp/.scons_cache
          FENNARA_CEF_ROOT: ${{ steps.linux_cef_sdk.outputs.cef_root }}
        run: scons platform=${{ matrix.platform }} target=editor --debug=explain --cache-show

      - name: Build local tools
        working-directory: local
        run: cargo build --release --locked

      - name: Assemble release archives
        run: node scripts/package-preview.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: fennara-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload addon part
        uses: actions/upload-artifact@v4
        with:
          name: fennara-addon-part-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/addon-part-${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error

  addon:
    name: package all-platform addon
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download addon parts
        uses: actions/download-artifact@v4
        with:
          path: addon-parts
          pattern: fennara-addon-part-*
          merge-multiple: true

      - name: Assemble all-platform addon archive
        run: node scripts/package-addon-all.mjs --parts-dir addon-parts

      - name: Upload all-platform addon archive
        uses: actions/upload-artifact@v4
        with:
          name: fennara-release-addon
          path: dist/fennara-addon-*.zip
          if-no-files-found: error
  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [package, addon]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fennara-release-*
          merge-multiple: true

      - name: Download generated Linux CEF manifest
        uses: actions/download-artifact@v4
        with:
          name: fennara-generated-linux-cef-manifest
          path: generated-linux-cef-manifest

      - name: Rename manifest-managed release packages
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          shopt -s nullglob

          renamed_local_count=0
          for asset in release-assets/fennara-local-*-v"${version}".zip; do
            renamed="${asset/release-assets\/fennara-local-/release-assets\/fennara-release-local-}"
            mv "${asset}" "${renamed}"
            renamed_local_count=$((renamed_local_count + 1))
          done
          if [[ "${renamed_local_count}" -eq 0 ]]; then
            echo "::error::No release-assets/fennara-local-*-v${version}.zip files found."
            exit 1
          fi

          if [[ -f "release-assets/fennara-addon-v${version}.zip" ]]; then
            mv "release-assets/fennara-addon-v${version}.zip" \
              "release-assets/fennara-release-addon-v${version}.zip"
          else
            echo "::error::Missing release-assets/fennara-addon-v${version}.zip"
            exit 1
          fi

      - name: Validate Linux CEF runtime release asset
        run: |
          cp generated-linux-cef-manifest/linux-cef.json local/webview-runtimes/linux-cef.json
          node scripts/check-linux-cef-runtime-release.mjs --assets-dir release-assets

      - name: Write release manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node scripts/write-release-manifest.mjs \
            --assets-dir release-assets \
            --linux-cef-manifest generated-linux-cef-manifest/linux-cef.json \
            --minimum-cli-version 0.3.8 \
            --out "release-assets/fennara-release-manifest-v${VERSION}.json"

      - name: Require immutable GitHub releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::RELEASE_ADMIN_TOKEN must provide repository Administration read access for the immutable-release preflight."
            exit 1
          fi
          immutable_enabled="$(
            gh api \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/immutable-releases" \
              --jq '.enabled' 2>/dev/null || true
          )"
          if [[ "${immutable_enabled}" != "true" ]]; then
            echo "::error::Repository release immutability must be enabled before publishing a release."
            exit 1
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PROMOTE_LATEST: ${{ inputs.promote_latest }}
        shell: bash
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          mapfile -t assets < <(find release-assets -type f \( -name '*.zip' -o -name 'fennara-release-manifest-v*.json' \) | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found."
            exit 1
          fi
          mapfile -t desired_assets < <(printf '%s\n' "${assets[@]##*/}" | sort)

          notes="Fennara Godot AI ${tag}

          Built from ${GITHUB_SHA}."
          promotion_assets=("${assets[@]}")
          reconcile_draft=false

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            read -r exact_immutable exact_draft exact_prerelease < <(
              gh release view "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json isImmutable,isDraft,isPrerelease \
                --jq '[.isImmutable, .isDraft, .isPrerelease] | @tsv'
            )
            exact_tag_sha="$(git ls-remote origin "refs/tags/${tag}" | awk '{print $1}')"
            exact_target="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
                --jq '.target_commitish'
            )"
            mapfile -t published_exact_assets < <(
              gh release view "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[].name' | sort
            )
            if [[ "${exact_immutable}" == "false" && "${exact_draft}" == "true" && "${exact_prerelease}" == "false" && "${exact_target}" == "${GITHUB_SHA}" ]]; then
              reconcile_draft=true
              echo "Resuming matching draft release ${tag}."
            elif [[ "${exact_immutable}" != "true" || "${exact_draft}" != "false" || "${exact_prerelease}" != "false" || "${exact_tag_sha}" != "${GITHUB_SHA}" ]] ||
              ! diff -u <(printf '%s\n' "${desired_assets[@]}") <(printf '%s\n' "${published_exact_assets[@]}"); then
              echo "::error::Existing ${tag} release does not match this immutable release request."
              exit 1
            else
              exact_assets_dir="${RUNNER_TEMP}/exact-release-${VERSION}"
              rm -rf "${exact_assets_dir}"
              mkdir -p "${exact_assets_dir}"
              gh release download "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --dir "${exact_assets_dir}"
              node scripts/verify-published-assets.mjs \
                --expected-dir release-assets \
                --actual-dir "${exact_assets_dir}"
              mapfile -t promotion_assets < <(find "${exact_assets_dir}" -maxdepth 1 -type f | sort)
              echo "Resuming promotion from matching immutable release ${tag}."
            fi
          else
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "Fennara Godot AI ${tag}" \
              --notes "${notes}" \
              --draft
            reconcile_draft=true
          fi

          if [[ "${reconcile_draft}" == "true" ]]; then
            gh release upload "${tag}" "${assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            mapfile -t draft_assets < <(
              gh release view "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[].name' | sort
            )
            for draft_asset in "${draft_assets[@]}"; do
              if ! printf '%s\n' "${desired_assets[@]}" | grep -Fxq "${draft_asset}"; then
                gh release delete-asset "${tag}" "${draft_asset}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --yes
              fi
            done
            exact_assets_dir="${RUNNER_TEMP}/exact-release-${VERSION}"
            rm -rf "${exact_assets_dir}"
            mkdir -p "${exact_assets_dir}"
            gh release download "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --dir "${exact_assets_dir}"
            node scripts/verify-published-assets.mjs \
              --expected-dir release-assets \
              --actual-dir "${exact_assets_dir}"
            if [[ "${PROMOTE_LATEST}" == "true" ]]; then
              gh release edit "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --draft=false \
                --latest
            else
              gh release edit "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --draft=false \
                --latest=false
            fi
            mapfile -t promotion_assets < <(find "${exact_assets_dir}" -maxdepth 1 -type f | sort)
          fi
          gh release verify "${tag}" --repo "${GITHUB_REPOSITORY}"

          if [[ "${PROMOTE_LATEST}" == "true" ]]; then
            github_latest_tag="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name'
            )"
            if [[ "${github_latest_tag}" != "${tag}" ]]; then
              echo "::error::GitHub Latest is ${github_latest_tag}, expected ${tag}. Immutable releases must be marked Latest when first published."
              exit 1
            fi

            legacy_tag_sha="$(git ls-remote origin refs/tags/latest | awk '{print $1}')"
            if [[ -z "${legacy_tag_sha}" ]]; then
              echo "::error::The legacy latest tag is missing. Restore it before publishing the one-time compatibility bootstrap."
              exit 1
            fi

            reconcile_legacy_draft=false
            if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              read -r legacy_immutable legacy_draft legacy_prerelease < <(
                gh release view latest \
                  --repo "${GITHUB_REPOSITORY}" \
                  --json isImmutable,isDraft,isPrerelease \
                  --jq '[.isImmutable, .isDraft, .isPrerelease] | @tsv'
              )
              if [[ "${legacy_immutable}" == "true" && "${legacy_draft}" == "false" && "${legacy_prerelease}" == "false" ]]; then
                echo "Legacy latest bootstrap is already frozen; leaving it unchanged."
              elif [[ "${legacy_immutable}" == "false" && "${legacy_draft}" == "true" && "${legacy_prerelease}" == "false" ]]; then
                reconcile_legacy_draft=true
                echo "Seeding the existing legacy latest draft as a one-time compatibility bootstrap."
              else
                echo "::error::The legacy latest release must be either a mutable draft awaiting its one-time bootstrap or an already-published immutable release."
                exit 1
              fi
            else
              legacy_notes="Legacy installer compatibility bootstrap.

          Frozen with Fennara ${tag} assets. Current installers and CLIs discover stable versions through GitHub's Latest release endpoint."
              gh release create latest \
                --repo "${GITHUB_REPOSITORY}" \
                --verify-tag \
                --title "Fennara legacy installer bootstrap" \
                --notes "${legacy_notes}" \
                --draft \
                --latest=false
              reconcile_legacy_draft=true
            fi

            if [[ "${reconcile_legacy_draft}" == "true" ]]; then
              gh release upload latest "${promotion_assets[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --clobber
              mapfile -t desired_legacy_assets < <(printf '%s\n' "${promotion_assets[@]##*/}" | sort)
              mapfile -t published_legacy_assets < <(
                gh release view latest \
                  --repo "${GITHUB_REPOSITORY}" \
                  --json assets \
                  --jq '.assets[].name' | sort
              )
              for published_asset in "${published_legacy_assets[@]}"; do
                if ! printf '%s\n' "${desired_legacy_assets[@]}" | grep -Fxq "${published_asset}"; then
                  gh release delete-asset latest "${published_asset}" \
                    --repo "${GITHUB_REPOSITORY}" \
                    --yes
                fi
              done
              legacy_assets_dir="${RUNNER_TEMP}/legacy-latest-release-${VERSION}"
              rm -rf "${legacy_assets_dir}"
              mkdir -p "${legacy_assets_dir}"
              gh release download latest \
                --repo "${GITHUB_REPOSITORY}" \
                --dir "${legacy_assets_dir}"
              node scripts/verify-published-assets.mjs \
                --expected-dir "$(dirname "${promotion_assets[0]}")" \
                --actual-dir "${legacy_assets_dir}"
              legacy_notes="Legacy installer compatibility bootstrap.

          Frozen with Fennara ${tag} assets. Current installers and CLIs discover stable versions through GitHub's Latest release endpoint."
              gh release edit latest \
                --repo "${GITHUB_REPOSITORY}" \
                --title "Fennara legacy installer bootstrap" \
                --notes "${legacy_notes}" \
                --draft=false \
                --latest=false
              gh release verify latest --repo "${GITHUB_REPOSITORY}"
              read -r legacy_immutable legacy_draft legacy_prerelease < <(
                gh release view latest \
                  --repo "${GITHUB_REPOSITORY}" \
                  --json isImmutable,isDraft,isPrerelease \
                  --jq '[.isImmutable, .isDraft, .isPrerelease] | @tsv'
              )
              if [[ "${legacy_immutable}" != "true" || "${legacy_draft}" != "false" || "${legacy_prerelease}" != "false" ]]; then
                echo "::error::The legacy latest compatibility bootstrap was not published immutably."
                exit 1
              fi
            fi

            github_latest_tag="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name'
            )"
            if [[ "${github_latest_tag}" != "${tag}" ]]; then
              echo "::error::Publishing the legacy bootstrap changed GitHub Latest to ${github_latest_tag}; expected ${tag}."
              exit 1
            fi
          fi
